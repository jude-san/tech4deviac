version: 3
automerge: false
autodiscover:
  mode: auto
  ignore_paths:
    - localstack-stack
delete_source_branch_on_merge: false
parallel_plan: false
parallel_apply: false
abort_on_execution_order_fail: true
projects:
  - name: tech4deviac
    branch: /jude-dev/
    dir: .
    # workspace: default
    terraform_distribution: terraform
    terraform_version: v1.10.5
    delete_source_branch_on_merge: false
    # repo_locks: true # deprecated: use repo_locks instead
    repo_locks:
      mode: on_plan
    custom_policy_check: false
    # autoplan:
    #   when_modified: ["*.tf", "../modules/**/*.tf", ".terraform.lock.hcl"]
    #   enabled: true
    plan_requirements: [mergeable]
    apply_requirements: [mergeable]
    import_requirements: []
    silence_pr_comments: ["apply"]
    execution_order_group: 0
    depends_on:
      - project-1
    workflow: myworkflow
workflows:
  myworkflow:
    plan:
      steps:
        - run: echo "Starting terraform plan on server"
          output: show
        - run:
            command: terraform init
            shell: sh
            output: show

            # extra_args: ["-lock", "false"]
        - run: terraform plan
          output: show

        - run:
            terraform apply

            # extra_args: ["-auto-approve"]
            # output: show
          output: show
# allowed_regexp_prefixes:
# - dev/
# - staging/
